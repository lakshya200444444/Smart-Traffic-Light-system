name: Deploy to GCP

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker to use GCP Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          docker build -t asia-southeast1-docker.pkg.dev/smart-traffic-464209/docker-repo/ktor-server:latest ./server
          docker push asia-southeast1-docker.pkg.dev/smart-traffic-464209/docker-repo/ktor-server:latest

      - name: SSH into VM and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 35.240.216.70
          username: sourav_0_alim
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull asia-southeast1-docker.pkg.dev/smart-traffic-464209/docker-repo/ktor-server:latest
            docker stop ktor-server || true
            docker rm ktor-server || true
            docker run -d --name ktor-server -p 8080:8080 asia-southeast1-docker.pkg.dev/smart-traffic-464209/docker-repo/ktor-server:latest