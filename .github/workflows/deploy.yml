name: Deploy to GCP VM

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: SSH into VM and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 35.240.216.70                         # ✅ Your GCP VM external IP
          username: sourav_0_alim                     # ✅ Your GCP VM username
          key: ${{ secrets.SSH_PRIVATE_KEY }}         # ✅ Your private key with no passphrase
          script: |
            echo "🔄 Navigating to project directory..."
            cd ~/Smart-Traffic-Management-System || exit 1

            echo "📦 Pulling latest code..."
            git pull origin main

            echo "🧼 Cleaning old containers..."
            docker-compose down || true

            echo "⚙️ Building and running new containers..."
            docker-compose up --build -d

            echo "✅ Deployment finished successfully."