name: Deploy to GCP VM

on:
  push:
    branches:
      - development

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: SSH into VM and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 34.87.172.238
          username: sourav_0_alim
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euxo pipefail

            echo "📁 Checking project directory..."
            if [ ! -d ~/Smart-Traffic-Management-System ]; then
              echo "📥 Cloning project..."
              git clone https://github.com/Alims-Repo/Smart-Traffic-Management-System.git ~/Smart-Traffic-Management-System
            fi

            echo "🔄 Navigating to project directory..."
            cd ~/Smart-Traffic-Management-System

            echo "📦 Pulling latest code..."
            git pull origin master

            echo "🧼 Cleaning old containers..."
            docker-compose down || true

            echo "⚙️ Building and running new containers..."
            docker-compose up --build -d

            echo "✅ Deployment finished successfully."